version: "3.9"

services:
  mavadoclaw:
    build: .
    container_name: mavadoclaw-ceo
    ports:
      - "8080:8080"
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN:-mavadoclaw-changeme}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - NVAPI_KEY=${NVAPI_KEY:-}
      - APPROVAL_DB_PATH=/app/data/approvals/approvals.db
      - OSINT_RESULTS_DIR=/app/data/osint
      - MEMORY_DIR=/app/data/memory
    volumes:
      - mavadoclaw_data:/app/data
      - mavadoclaw_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - mavadoclaw_net

  omniroute:
    image: node:20-alpine
    container_name: omniroute
    ports:
      - "3000:3000"
    volumes:
      - ./omniroute:/app
    working_dir: /app
    command: node server.js
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - mavadoclaw_net

  ninerouter:
    image: node:20-alpine
    container_name: ninerouter
    ports:
      - "8081:8081"
    volumes:
      - ./ninerouter:/app
    working_dir: /app
    command: node server.js
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8081/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - mavadoclaw_net

volumes:
  mavadoclaw_data:
  mavadoclaw_logs:

networks:
  mavadoclaw_net:
    driver: bridge
