name: Daily Briefing - 08:00 UTC

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Briefing
        run: |
          curl -X POST "${{ secrets.PANDASTACK_URL }}/api/chat" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Token: ${{ secrets.ADMIN_TOKEN }}" \
            --max-time 60 \
            -d '{"messages":[{"role":"user","content":"@agent ceo Generate the daily company briefing: agent statuses, pending tasks, OSINT alerts, LLM quota usage, and top 3 priorities for today."}]}' \
            || echo "Briefing trigger failed"

      - name: Notify Telegram
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=MavadoClaw daily briefing triggered. Check /api/queue for pending approvals." \
            || echo "Telegram notification skipped"
