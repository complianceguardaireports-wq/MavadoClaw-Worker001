name: Daily Briefing

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Briefing
        run: |
          curl -X POST "${{ secrets.PANDASTACK_URL }}/api/chat" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Token: ${{ secrets.ADMIN_TOKEN }}" \
            --max-time 60 \
            -d '{"messages":[{"role":"user","content":"Generate the daily company briefing."}]}' \
            || echo "Briefing trigger failed"
